<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAFO OS - Infinite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.3);
            --bg: #030303;
            --sidebar: #0a0a0c;
            --card: rgba(22, 22, 26, 0.8);
            --border: rgba(255, 255, 255, 0.07);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            overflow: hidden; /* Prevent body scroll, use container scroll */
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            z-index: 100;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        .nav-group { margin-bottom: 30px; }
        .nav-label { font-size: 10px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 15px; display: block; }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 12px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            cursor: pointer;
            margin-bottom: 5px;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(168, 85, 247, 0.1);
            color: var(--text);
        }

        .nav-item.active { border-left: 3px solid var(--accent); }

        .category-tag {
            width: 8px; height: 8px; border-radius: 50%;
        }

        /* --- MAIN CONTENT --- */
        .main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .glass-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .quote-box {
            font-size: 13px;
            color: var(--text-dim);
            font-style: italic;
            max-width: 400px;
        }

        /* --- DASHBOARD WIDGETS --- */
        .widgets {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .widget {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .widget-val { font-size: 28px; font-weight: 800; display: block; margin-bottom: 5px; }
        .widget-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; }

        /* --- TASK INPUT AREA --- */
        .input-focus-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .input-row-top { display: flex; gap: 15px; margin-bottom: 15px; }
        .input-row-bottom { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; }

        input, select {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: white;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); box-shadow: 0 0 15px var(--accent-glow); }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--accent-glow); }

        /* --- TASK LISTING --- */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .search-box {
            position: relative;
            width: 300px;
        }

        .search-box input { width: 100%; padding-left: 40px; border-radius: 30px; }

        .task-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px 25px;
            border-radius: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .task-card:hover { border-color: var(--accent); transform: scale(1.01); background: rgba(255,255,255,0.02); }

        .check-pill {
            width: 26px; height: 26px;
            border: 2px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .task-card.completed { opacity: 0.4; filter: grayscale(1); }
        .task-card.completed .check-pill { background: var(--success); border-color: var(--success); }
        .task-card.completed .check-pill::after { content: "✓"; color: white; font-weight: bold; }

        .task-info { flex: 1; }
        .task-title { font-size: 16px; font-weight: 600; margin-bottom: 5px; display: block; }
        .task-meta { display: flex; gap: 15px; font-size: 12px; color: var(--text-dim); }

        .tag { padding: 2px 8px; border-radius: 4px; font-weight: 700; font-size: 10px; text-transform: uppercase; }
        .tag-high { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .tag-med { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .tag-low { background: rgba(34, 197, 94, 0.1); color: var(--success); }

        .action-btns { display: flex; gap: 8px; opacity: 0; transition: 0.3s; }
        .task-card:hover .action-btns { opacity: 1; }

        .icon-btn {
            background: rgba(255,255,255,0.05);
            border: none; color: white;
            width: 32px; height: 32px;
            border-radius: 8px; cursor: pointer;
            transition: 0.2s;
        }
        .icon-btn:hover { background: var(--accent); }
        .icon-btn.del:hover { background: var(--danger); }

        /* --- POMODORO MODAL --- */
        .timer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(20px);
        }

        .timer-content { text-align: center; }
        .timer-display { font-family: 'JetBrains Mono', monospace; font-size: 120px; font-weight: 800; color: var(--accent); margin-bottom: 20px; }
        
        /* --- UTILS --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .overdue-alert { color: var(--danger); font-weight: bold; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">CHAFO OS v4</div>
        
        <nav class="nav-group">
            <span class="nav-label">Menu</span>
            <div class="nav-item active" onclick="switchView('all', this)">📂 All Projects</div>
            <div class="nav-item" onclick="switchView('today', this)">⚡ Active Today</div>
            <div class="nav-item" onclick="switchView('overdue', this)">⚠️ Overdue</div>
            <div class="nav-item" onclick="toggleTimer()">⏲️ Focus Mode</div>
        </nav>

        <nav class="nav-group">
            <span class="nav-label">Categories</span>
            <div id="catList">
                </div>
            <div class="nav-item" onclick="addCategory()" style="font-size: 12px; color: var(--accent);">+ Add Category</div>
        </nav>

        <div style="margin-top: auto;">
            <div class="nav-item" onclick="exportData()">💾 Backup Data</div>
            <div class="nav-item" onclick="importData()">📥 Restore</div>
        </div>
    </aside>

    <main class="main">
        <header class="glass-header">
            <div>
                <h2 id="viewTitle">All Projects</h2>
                <div class="quote-box" id="quote">"The best way to predict the future is to create it."</div>
            </div>
            <div id="clock" style="font-family: 'JetBrains Mono'; color: var(--accent);">00:00:00</div>
        </header>

        <section class="widgets">
            <div class="widget">
                <span class="widget-label">Efficiency</span>
                <span class="widget-val" id="wRate">0%</span>
                <div style="height:4px; background:rgba(255,255,255,0.05); border-radius:5px;">
                    <div id="wBar" style="height:100%; width:0%; background:var(--accent); border-radius:5px; transition:1s;"></div>
                </div>
            </div>
            <div class="widget">
                <span class="widget-label">Completed</span>
                <span class="widget-val" id="wDone">0</span>
            </div>
            <div class="widget">
                <span class="widget-label">Streak</span>
                <span class="widget-val" id="wStreak">0 Days</span>
            </div>
        </section>

        <section class="input-focus-card">
            <div class="input-row-top">
                <input type="text" id="taskInput" placeholder="Define your next objective..." style="flex:1">
            </div>
            <div class="input-row-bottom">
                <select id="catSelect">
                    <option value="School Work">School Work</option>
                    <option value="Personal">Personal</option>
                    <option value="Fitness">Fitness</option>
                </select>
                <select id="prioSelect">
                    <option value="low">Low Priority</option>
                    <option value="medium">Medium</option>
                    <option value="high">High Priority</option>
                </select>
                <input type="date" id="dateInput">
                <button class="btn-primary" onclick="addTask()">INITIALIZE</button>
            </div>
        </section>

        <div class="list-header">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search objectives..." oninput="renderTasks()">
            </div>
            <select id="sortSelect" onchange="renderTasks()" style="padding: 8px 15px; font-size: 12px;">
                <option value="newest">Recent First</option>
                <option value="prio">Priority Level</option>
                <option value="date">Deadline</option>
            </select>
        </div>

        <div id="taskFlow"></div>
    </main>

    <div class="timer-overlay" id="timerOverlay">
        <div class="timer-content">
            <h2 style="margin-bottom: 20px; letter-spacing: 5px;">FOCUS MODE</h2>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <button class="btn-primary" onclick="startTimer()" id="timerBtn">START</button>
                <button class="btn-primary" style="background:#444;" onclick="toggleTimer()">EXIT</button>
            </div>
        </div>
    </div>

    <audio id="ding" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        // --- CORE DATA ---
        let tasks = JSON.parse(localStorage.getItem('chafo_infinite_tasks')) || [];
        let categories = JSON.parse(localStorage.getItem('chafo_infinite_cats')) || ["School Work", "Personal", "Fitness"];
        let currentView = 'all';
        let timerInterval;

        const quotes = [
            "Focus on being productive instead of busy.",
            "Your mind is for having ideas, not holding them.",
            "Action is the foundational key to all success.",
            "Small progress is still progress.",
            "Done is better than perfect."
        ];

        // --- INITIALIZATION ---
        function init() {
            renderCategories();
            renderTasks();
            updateStats();
            updateQuote();
            startTime();
            setInterval(startTime, 1000);
        }

        // --- UI RENDERERS ---
        function renderCategories() {
            const list = document.getElementById('catList');
            const select = document.getElementById('catSelect');
            list.innerHTML = '';
            select.innerHTML = '';

            categories.forEach(cat => {
                list.innerHTML += `
                    <div class="nav-item" onclick="switchView('${cat}', this)">
                        <span class="category-tag" style="background:var(--accent)"></span>
                        ${cat}
                    </div>
                `;
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        }

        function renderTasks() {
            const flow = document.getElementById('taskFlow');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const sort = document.getElementById('sortSelect').value;
            const today = new Date().toISOString().split('T')[0];

            let filtered = tasks.filter(t => t.text.toLowerCase().includes(search));

            // View Filtering
            if (currentView === 'today') filtered = filtered.filter(t => t.date === today);
            else if (currentView === 'overdue') filtered = filtered.filter(t => t.date && t.date < today && !t.completed);
            else if (categories.includes(currentView)) filtered = filtered.filter(t => t.category === currentView);

            // Sorting
            if (sort === 'prio') {
                const w = { high: 3, medium: 2, low: 1 };
                filtered.sort((a,b) => w[b.priority] - w[a.priority]);
            } else if (sort === 'date') {
                filtered.sort((a,b) => new Date(a.date || '9999') - new Date(b.date || '9999'));
            } else {
                filtered.sort((a,b) => b.id - a.id);
            }

            flow.innerHTML = '';
            if (filtered.length === 0) {
                flow.innerHTML = `<div class="empty">System idle. No tasks detected in this sector.</div>`;
                return;
            }

            filtered.forEach(t => {
                const isOverdue = t.date && t.date < today && !t.completed;
                flow.innerHTML += `
                    <div class="task-card ${t.completed ? 'completed' : ''}" onclick="toggleTask(${t.id})">
                        <div class="check-pill"></div>
                        <div class="task-info">
                            <span class="task-title">${t.text}</span>
                            <div class="task-meta">
                                <span class="tag tag-${t.priority === 'medium' ? 'med' : t.priority}">${t.priority}</span>
                                <span>📂 ${t.category}</span>
                                <span class="${isOverdue ? 'overdue-alert' : ''}">${t.date ? '📅 ' + t.date : 'No Deadline'}</span>
                            </div>
                        </div>
                        <div class="action-btns">
                            <button class="icon-btn" onclick="event.stopPropagation(); editTask(${t.id})">✎</button>
                            <button class="icon-btn del" onclick="event.stopPropagation(); deleteTask(${t.id})">✕</button>
                        </div>
                    </div>
                `;
            });
        }

        // --- CORE LOGIC ---
        function addTask() {
            const text = document.getElementById('taskInput').value;
            const category = document.getElementById('catSelect').value;
            const priority = document.getElementById('prioSelect').value;
            const date = document.getElementById('dateInput').value;

            if (!text.trim()) return;

            tasks.push({
                id: Date.now(),
                text: text.trim(),
                category,
                priority,
                date,
                completed: false,
                created: new Date().toLocaleDateString()
            });

            document.getElementById('taskInput').value = '';
            saveAndSync();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            task.completed = !task.completed;
            if (task.completed) document.getElementById('ding').play();
            saveAndSync();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndSync();
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            const newText = prompt("Update mission protocol:", task.text);
            if (newText) {
                task.text = newText;
                saveAndSync();
            }
        }

        function addCategory() {
            const name = prompt("Enter new category name:");
            if (name && !categories.includes(name)) {
                categories.push(name);
                localStorage.setItem('chafo_infinite_cats', JSON.stringify(categories));
                renderCategories();
            }
        }

        function saveAndSync() {
            localStorage.setItem('chafo_infinite_tasks', JSON.stringify(tasks));
            updateStats();
            renderTasks();
        }

        // --- UTILITIES ---
        function updateStats() {
            const done = tasks.filter(t => t.completed).length;
            const rate = tasks.length > 0 ? Math.round((done / tasks.length) * 100) : 0;
            
            document.getElementById('wDone').textContent = done;
            document.getElementById('wRate').textContent = rate + '%';
            document.getElementById('wBar').style.width = rate + '%';
        }

        function switchView(v, el) {
            currentView = v;
            document.getElementById('viewTitle').textContent = v.charAt(0).toUpperCase() + v.slice(1);
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            renderTasks();
        }

        function startTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString();
        }

        function updateQuote() {
            document.getElementById('quote').textContent = `"${quotes[Math.floor(Math.random()*quotes.length)]}"`;
        }

        // --- TIMER LOGIC ---
        let secondsLeft = 1500;
        let isRunning = false;

        function toggleTimer() {
            const overlay = document.getElementById('timerOverlay');
            overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
        }

        function startTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                document.getElementById('timerBtn').textContent = 'START';
            } else {
                document.getElementById('timerBtn').textContent = 'STOP';
                timerInterval = setInterval(() => {
                    secondsLeft--;
                    const mins = Math.floor(secondsLeft / 60);
                    const secs = secondsLeft % 60;
                    document.getElementById('timerDisplay').textContent = 
                        `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                    if (secondsLeft <= 0) {
                        clearInterval(timerInterval);
                        alert("Focus Session Complete!");
                        secondsLeft = 1500;
                    }
                }, 1000);
            }
            isRunning = !isRunning;
        }

        // --- DATA MGMT ---
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({tasks, categories}));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "chafo_backup.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.readAsText(file,'UTF-8');
                reader.onload = readerEvent => {
                    const content = JSON.parse(readerEvent.target.result);
                    tasks = content.tasks;
                    categories = content.categories;
                    saveAndSync();
                    renderCategories();
                    location.reload();
                }
            }
            input.click();
        }

        init();
    </script>
</body>
</html>
